# Pytest Configuration File
# This file configures pytest behavior for the entire project

[tool:pytest]
# Test discovery patterns
python_files = test_*.py *_test.py
python_classes = Test*
python_functions = test_*

# Directories to search for tests
testpaths = tests

# Show extra test summary info
addopts =
    -v                          # Verbose output
    --tb=short                  # Shorter traceback format
    --strict-markers            # Require markers to be registered
    --disable-warnings          # Hide warnings from dependencies
    -ra                         # Show summary of all test outcomes
    --cov=.                     # Enable coverage for all modules
    --cov-report=html           # Generate HTML coverage report
    --cov-report=term-missing   # Show missing lines in terminal

# Minimum coverage percentage (tests fail if below this)
# Uncomment to enforce coverage requirements
# --cov-fail-under=80

# Markers for categorizing tests
markers =
    unit: Unit tests (fast, isolated)
    integration: Integration tests (database, external services)
    slow: Slow-running tests (browser automation, large datasets)
    scraper: Tests for scraper modules
    database: Tests for database operations
    alerts: Tests for alert system
    reports: Tests for report generation

# Test timeout (kill tests running longer than this)
timeout = 300

# Configure coverage
[coverage:run]
source = .
omit = 
    */tests/*
    */venv/*
    */__pycache__/*
    */migrations/*
    setup.py

[coverage:report]
precision = 2
skip_empty = True
exclude_lines =
    pragma: no cover
    def __repr__
    raise AssertionError
    raise NotImplementedError
    if __name__ == .__main__.:
    if TYPE_CHECKING:
