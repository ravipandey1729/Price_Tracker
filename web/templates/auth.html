{% extends "base.html" %}

{% block title %}Login - Price Tracker{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-7 col-lg-5">
        <div class="card shadow-sm">
            <div class="card-body p-4">
                <h1 class="h4 mb-3">Account Access</h1>
                <p class="text-muted">Login or create account for personal tracked products and alerts.</p>

                <ul class="nav nav-tabs mb-3" id="authTabs" role="tablist">
                    <li class="nav-item"><button class="nav-link active" id="login-tab" data-bs-toggle="tab" data-bs-target="#login-pane" type="button">Login</button></li>
                    <li class="nav-item"><button class="nav-link" id="register-tab" data-bs-toggle="tab" data-bs-target="#register-pane" type="button">Register</button></li>
                </ul>

                <div class="tab-content">
                    <div class="tab-pane fade show active" id="login-pane">
                        <form id="login-form" class="row g-3">
                            <div class="col-12">
                                <label class="form-label">Email</label>
                                <input type="email" class="form-control" id="login-email" required>
                            </div>
                            <div class="col-12">
                                <label class="form-label">Password</label>
                                <input type="password" class="form-control" id="login-password" required>
                            </div>
                            <div class="col-12">
                                <button class="btn btn-primary w-100" type="submit" id="login-btn">Login</button>
                            </div>
                        </form>
                    </div>

                    <div class="tab-pane fade" id="register-pane">
                        <form id="register-form" class="row g-3">
                            <div class="col-12">
                                <label class="form-label">Full Name</label>
                                <input type="text" class="form-control" id="register-name">
                            </div>
                            <div class="col-12">
                                <label class="form-label">Email</label>
                                <input type="email" class="form-control" id="register-email" required>
                            </div>
                            <div class="col-12">
                                <label class="form-label">Password</label>
                                <input type="password" class="form-control" id="register-password" minlength="8" required>
                            </div>
                            <div class="col-12">
                                <button class="btn btn-success w-100" type="submit" id="register-btn">Create Account</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_scripts %}
<script>
async function handleAuth(endpoint, payload, button) {
    showLoading(button);
    try {
        const result = await PriceTracker.apiRequest(`/auth/${endpoint}`, {
            method: 'POST',
            body: JSON.stringify(payload)
        });

        localStorage.setItem('access_token', result.access_token);
        PriceTracker.showNotification('Authentication successful', 'success');
        setTimeout(() => { window.location.href = '/search'; }, 700);
    } catch (error) {
        PriceTracker.showNotification(error.message || 'Authentication failed', 'danger');
    } finally {
        hideLoading(button);
    }
}

document.getElementById('login-form').addEventListener('submit', async (event) => {
    event.preventDefault();
    await handleAuth('login', {
        email: document.getElementById('login-email').value.trim(),
        password: document.getElementById('login-password').value
    }, document.getElementById('login-btn'));
});

document.getElementById('register-form').addEventListener('submit', async (event) => {
    event.preventDefault();
    await handleAuth('register', {
        full_name: document.getElementById('register-name').value.trim() || null,
        email: document.getElementById('register-email').value.trim(),
        password: document.getElementById('register-password').value
    }, document.getElementById('register-btn'));
});
</script>
{% endblock %}
