# ============================================================================
# SCHEDULING
# ============================================================================
scheduling:
  # Scraping frequency (how often to check prices)
  scrape_interval_hours: 4 # Check every 4 hours

  # Weekly report schedule (cron-style)
  weekly_report:
    enabled: true
    day_of_week: "sun" # mon, tue, wed, thu, fri, sat, sun
    hour: 20 # 24-hour format (20 = 8 PM)
    minute: 0

  # Data cleanup schedule
  cleanup_old_data:
    enabled: true
    day_of_week: "mon"
    hour: 2
    minute: 0

# ============================================================================
# ALERTING
# ============================================================================
alerts:
  enabled: true # Master switch for all alerts
  cooldown_hours: 24 # Prevent duplicate alerts for same product within 24 hours
  
  # Email settings
  email:
    enabled: true
    smtp_server: "smtp.gmail.com"
    smtp_port: 587
    # Credentials loaded from .env: EMAIL_USERNAME, EMAIL_PASSWORD
    # from_email: defaults to EMAIL_FROM from .env
    to_emails:
      - "your-email@example.com" # Replace with your actual email
    # Add multiple recipients:
    # - "person1@example.com"
    # - "person2@example.com"

  # Slack settings
  slack:
    enabled: false # Set to true when Slack webhook is configured
    # webhook_url loaded from .env: SLACK_WEBHOOK_URL
    channel: "#price-alerts"
    username: "Price Tracker Bot"

  # Alert conditions (global defaults, can override per product)
  conditions:
    min_percentage_drop: 5 # Only alert on drops of 5% or more
    alert_on_all_time_low: true # Alert when price is lowest ever seen
    alert_on_target_price: true # Alert when price drops below target

# ============================================================================
# WEEKLY REPORTS
# ============================================================================
reports:
  enabled: true # Enable weekly email reports
  days_to_include: 7 # Include last 7 days of price data
  top_deals_count: 5 # Show top 5 savings opportunities
  
  # Chart settings for email reports
  chart_width: 10 # Width in inches
  chart_height: 6 # Height in inches
  dpi: 100 # Resolution for embedded charts
  
  # Email delivery (uses same SMTP settings as alerts)
  send_email: true

# ============================================================================
# REPORTING
# ============================================================================
reporting:
  # Output folder for generated reports
  output_folder: "reports/output"

  # Chart settings
  charts:
    dpi: 100
    figure_size: [10, 6] # Width, height in inches
    style: "seaborn-v0_8-darkgrid"
    color_scheme: "tab10"

  # Report content
  include_charts: true
  include_statistics: true
  include_competitor_comparison: true
  chart_days_history: 7 # Show last 7 days of data in charts

  # Export formats
  export_formats:
    - "html"
    # - "pdf"  # Uncomment to also generate PDFs

# ============================================================================
# LOGGING
# ============================================================================
logging:
  level: "INFO" # DEBUG, INFO, WARNING, ERROR, CRITICAL
  console_output: true
  file_output: true

  # Log file rotation
  max_file_size_mb: 10
  backup_count: 5 # Keep 5 old log files

  # Separate log files
  files:
    main: "logs/price_tracker.log"
    scraper_errors: "logs/scraper_errors.log"
    alerts: "logs/alerts.log"
    scheduler: "logs/scheduler.log"
