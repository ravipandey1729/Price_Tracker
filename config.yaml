# Price Tracker Configuration File
# Edit this file to customize scraping behavior, alert thresholds, and scheduling

# ============================================================================
# DATABASE SETTINGS
# ============================================================================
database:
  path: "price_tracker.db" # SQLite database file location
  backup_enabled: true
  backup_frequency_days: 7
  data_retention_days: 90 # Delete price records older than this

# ============================================================================
# SCRAPING SETTINGS
# ============================================================================
scraping:
  # Request delays (in seconds)
  min_delay: 2 # Minimum delay between requests to same site
  max_delay: 5 # Maximum delay (randomly chosen between min and max)

  # Retry settings
  max_retries: 3
  retry_backoff_factor: 2 # Exponential backoff: 2, 4, 8 seconds

  # Request timeout
  timeout_seconds: 30

  # User agent rotation
  rotate_user_agent: true

  # Store failed scrapes for debugging
  save_failed_html: true

# ============================================================================
# COMPETITOR SITES
# ============================================================================
# Add one entry per competitor site you want to track
# Each site needs CSS selectors to find product name, price, etc.

sites:
  # Example: Amazon
  - name: "Amazon"
    enabled: true
    base_url: "https://www.amazon.com"
    selectors:
      price: "#priceblock_ourprice, .a-price-whole"
      product_name: "#productTitle"
      availability: "#availability span"
      currency: ".a-price-symbol"
    # Fallback selectors if primary ones fail
    fallback_selectors:
      price: "span.a-offscreen"

  # Example: eBay
  - name: "eBay"
    enabled: true
    base_url: "https://www.ebay.com"
    selectors:
      price: ".x-price-primary"
      product_name: ".x-item-title__mainTitle"
      availability: ".d-quantity__availability"
      currency: ".x-price-currency"

  # Example: Walmart
  - name: "Walmart"
    enabled: false # Set to true when ready to use
    base_url: "https://www.walmart.com"
    selectors:
      price: "[itemprop='price']"
      product_name: "h1[itemprop='name']"
      availability: ".prod-ProductOffer-oosMsg"

